<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CCC — Claude Command Center</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="/vendor/xterm/css/xterm.css">
</head>
<body>
  <div class="app">
    <!-- Sidebar / Tree View -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <span class="logo">&#x2B21;</span> Claude Control Center
        <span class="sidebar-header-spacer"></span>
        <button class="add-project-btn" id="refreshBtn" title="Refresh project tree">&#x21BB;</button>
        <button class="add-project-btn" id="addProjectBtn" title="Add project">+</button>
      </div>

      <nav class="tree-view" id="treeView">
        <!-- Rendered by app.js -->
      </nav>

      <div class="sidebar-footer">
        <div class="settings-entry" id="settingsEntry" title="Application settings">
          <span class="settings-icon">&#x2699;</span> Settings
          <span class="version-label" id="versionLabel"></span>
        </div>
      </div>
    </aside>

    <!-- Resize Handle -->
    <div class="resize-handle" id="resizeHandle"></div>

    <!-- Main Panel -->
    <main class="main-panel">
      <div class="tab-bar" id="tabBar">
        <!-- Rendered by app.js -->
      </div>

      <div class="tab-content" id="tabContent">
        <!-- Rendered by app.js -->
      </div>

      <!-- Usage Status Bar -->
      <div class="usage-bar" id="usageBar">
        <div class="usage-bar-inner" id="usageBarInner">
          <span class="usage-label" title="Usage measured from CLI sessions only. Claude Desktop and Claude Chat consume the same shared limit and are not visible to CCC. Actual remaining headroom may be lower than shown.">Rate limit (CLI only)</span>
          <div class="usage-progress-wrap">
            <div class="usage-progress-fill" id="usageProgressFill"></div>
          </div>
          <span class="usage-percent" id="usagePercent">—</span>
          <span class="usage-sep">&middot;</span>
          <span class="usage-reset" id="usageReset">—</span>
          <span class="usage-sep">&middot;</span>
          <span class="usage-msg-info" id="usageMsgInfo">—</span>
          <span class="usage-divider"></span>
          <span class="usage-label">7d</span>
          <div class="usage-progress-wrap">
            <div class="usage-progress-fill" id="usageWeeklyFill"></div>
          </div>
          <span class="usage-percent" id="usageWeeklyPercent">—</span>
          <span class="usage-sep">&middot;</span>
          <span class="usage-weekly" id="usageWeekly">—</span>
          <span class="usage-sep">&middot;</span>
          <span class="usage-updated" id="usageUpdated"></span>
        </div>
      </div>
    </main>
  </div>

  <script src="/vendor/xterm/lib/xterm.js"></script>
  <script src="/vendor/xterm-addon-fit/lib/addon-fit.js"></script>
  <script src="/vendor/marked/marked.umd.js"></script>
  <script src="app.js"></script>
</body>
</html>
